<!-- compare.html v2.0 — หน้าเปรียบเทียบเอกสาร (ตารางคู่ ซ้าย-ขวา) อ่านจาก Supabase delivery_views -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>เปรียบเทียบเอกสาร</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1f2733; --muted:#6b7686; --line:#e3e7ee; --line2:#eef1f5;
    --paper:#ffffff; --bg:#eceff3;
    --band:#27344b; --band2:#324563;
    --ok:#15803d; --ok-bg:#e7f6ec;
    --diff:#b45309; --diff-bg:#fdf2e3;
    --miss:#b91c1c; --miss-bg:#fceceb; --miss-dot:#c7ccd6;
    --accent:#324563;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Sarabun',-apple-system,'Segoe UI',Tahoma,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding:16px;
  }
  .sheet{
    max-width:920px; margin:0 auto; background:var(--paper);
    border-radius:14px; overflow:hidden;
    box-shadow:0 1px 2px rgba(20,30,50,.05),0 12px 32px rgba(20,30,50,.10);
  }

  /* ── หัวกระดาษ ── */
  .band{ background:linear-gradient(135deg,var(--band),var(--band2)); color:#fff; padding:20px 22px; }
  .band .kicker{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; opacity:.72; font-weight:600; }
  .band h1{ margin:4px 0 0; font-size:21px; font-weight:700; line-height:1.3; }
  .band .co{ margin-top:8px; font-size:14px; opacity:.85; display:flex; gap:8px; flex-wrap:wrap; }
  .band .co b{ font-weight:600; }

  /* ── การ์ดเอกสาร 2 ฝั่ง ── */
  .docs{ display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line); }
  .doc{ background:var(--paper); padding:16px 18px; }
  .doc .lbl{ font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.04em; }
  .doc .ref{ font-size:17px; font-weight:700; margin-top:2px; color:var(--accent); word-break:break-word; }
  .doc .meta{ margin-top:8px; font-size:13px; color:var(--muted); display:grid; gap:3px; }
  .doc .meta span b{ color:var(--ink); font-weight:500; }

  /* ── แถบสรุป ── */
  .summary{ display:flex; flex-wrap:wrap; gap:10px; padding:16px 18px 6px; border-top:1px solid var(--line); }
  .chip{ display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:10px; font-size:14px; font-weight:600; }
  .chip .n{ font-size:18px; font-weight:700; }
  .chip.ok{ background:var(--ok-bg); color:var(--ok); }
  .chip.diff{ background:var(--diff-bg); color:var(--diff); }
  .chip.miss{ background:var(--miss-bg); color:var(--miss); }

  /* ── สัญลักษณ์อธิบายจุดสี ── */
  .legend{ display:flex; flex-wrap:wrap; gap:14px; padding:8px 18px 12px; font-size:12.5px; color:var(--muted); }
  .legend .lg{ display:inline-flex; align-items:center; gap:6px; }
  .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; flex:none; }
  .dot-ok{ background:var(--ok); }
  .dot-diff{ background:var(--diff); }
  .dot-miss{ background:var(--miss-dot); }

  /* ── ตารางคู่ ซ้าย/ขวา ── */
  .cmpwrap{ padding:0 12px 14px; overflow-x:auto; }
  .cmp{ min-width:480px; }
  .cmp-head{ display:grid; grid-template-columns:1fr 40px 1fr; gap:1px; background:var(--line); }
  .cmp-head .h{ background:#f7f9fc; color:var(--muted); font-weight:600; font-size:12.5px;
    padding:10px 12px; border-bottom:2px solid var(--line); word-break:break-word; }
  .cmp-head .h.right{ text-align:right; }

  .cmp-row{ display:grid; grid-template-columns:1fr 40px 1fr; gap:1px; background:var(--line); }
  .cell{ background:var(--paper); padding:11px 12px; min-width:0; }
  .cell.right{ text-align:right; }
  .cell.mid{ display:flex; align-items:center; justify-content:center; padding:11px 4px; }
  .cell.empty{ display:flex; align-items:center; color:#c3c8d2; font-size:12.5px; font-style:italic; }
  .cell.empty.right{ justify-content:flex-end; text-align:right; }
  .pname{ font-weight:500; word-break:break-word; }
  .code{ font-size:11.5px; color:var(--muted); font-family:ui-monospace,monospace; }
  .qty{ margin-top:4px; font-weight:700; font-variant-numeric:tabular-nums; font-size:15px; }
  .qty .unit{ font-size:12px; font-weight:400; color:var(--muted); }
  .qty-sub{ margin-top:2px; font-size:11.5px; color:var(--muted); font-weight:400; }

  .row-diff .cell:not(.mid){ background:var(--diff-bg); }
  .row-miss .cell:not(.mid){ background:var(--miss-bg); }

  .cmp-empty{ padding:24px; text-align:center; color:var(--muted); background:var(--paper); }

  /* ── footer / ปุ่ม ── */
  .foot{ padding:14px 18px 18px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  .foot .gen{ font-size:12px; color:var(--muted); }
  .btn{ appearance:none; border:1px solid var(--accent); background:var(--accent); color:#fff;
    font-family:inherit; font-size:14px; font-weight:600; padding:9px 18px; border-radius:9px; cursor:pointer; }
  .btn:active{ transform:translateY(1px); }

  .state{ max-width:520px; margin:48px auto; text-align:center; background:var(--paper);
    border-radius:14px; padding:40px 28px; box-shadow:0 10px 30px rgba(20,30,50,.08); }
  .state .em{ font-size:40px; }
  .state h2{ margin:12px 0 6px; font-size:19px; }
  .state p{ margin:0; color:var(--muted); font-size:14px; }
  .spin{ width:30px; height:30px; border:3px solid var(--line); border-top-color:var(--accent);
    border-radius:50%; animation:sp 0.8s linear infinite; margin:0 auto; }
  @keyframes sp{ to{ transform:rotate(360deg) } }

  @media (max-width:560px){
    body{ padding:8px; }
    .docs{ grid-template-columns:1fr; }
    .band h1{ font-size:19px; }
    .cmp-head,.cmp-row{ grid-template-columns:1fr 28px 1fr; }
    .cell{ padding:9px 8px; font-size:13px; }
    .cell.mid{ padding:9px 2px; }
    .qty{ font-size:14px; }
    .legend{ font-size:11.5px; gap:10px; padding:6px 12px 10px; }
    .cmp{ min-width:0; }
  }
  @media print{
    body{ background:#fff; padding:0; }
    .sheet{ box-shadow:none; border-radius:0; max-width:none; }
    .btn{ display:none; }
    .cmpwrap{ overflow-x:visible; }
    .cmp{ min-width:0; }
    *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; color-adjust:exact; }
    .cmp-row,.docs,.band,.summary,.legend{ break-inside:avoid; }
    .band{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
  @page{ margin:12mm; }
</style>
</head>
<body>
<div id="app">
  <div class="state"><div class="spin"></div><h2 style="margin-top:16px">กำลังโหลดข้อมูล…</h2></div>
</div>

<script>
const SB_URL = 'https://rvdboyrusmrjzurukwja.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2ZGJveXJ1c21yanp1cnVrd2phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNTQ3MDEsImV4cCI6MjA5NTgzMDcwMX0.UxP6ZlJ41DxxG_ofA6ge43XIfm6BMIOARvmsn1gDtrQ';

const app = document.getElementById('app');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num = n => (n==null||n==='') ? '–' : (isFinite(+n) ? (+n).toLocaleString('th-TH',{maximumFractionDigits:2}) : esc(n));
const qp  = k => new URLSearchParams(location.search).get(k);

function showState(em, title, msg){
  app.innerHTML = `<div class="state"><div class="em">${em}</div><h2>${esc(title)}</h2><p>${esc(msg||'')}</p></div>`;
}

// ── ดึง field แรกที่มีค่า (รองรับชื่อ key ได้หลายแบบ) ──
function pick(obj, keys, dflt){
  for(const k of keys){ if(obj && obj[k]!=null && obj[k]!=='') return obj[k]; }
  return dflt;
}

function docCard(lbl, ref, doc){
  const m = [];
  const partner = Array.isArray(doc?.partner_id) ? doc.partner_id[1] : (doc?.partner||doc?.partner_id);
  const date = doc?.date_order || doc?.date_start || doc?.scheduled_date;
  if(partner) m.push(`<span>คู่ค้า: <b>${esc(partner)}</b></span>`);
  if(date)    m.push(`<span>วันที่: <b>${esc(String(date).slice(0,10))}</b></span>`);
  if(doc?.state) m.push(`<span>สถานะ: <b>${esc(doc.state)}</b></span>`);
  if(doc?.amount_total!=null) m.push(`<span>ยอดรวม: <b>${num(doc.amount_total)}</b></span>`);
  return `<div class="doc"><div class="lbl">${esc(lbl)}</div><div class="ref">${esc(ref)}</div>
    <div class="meta">${m.join('')}</div></div>`;
}

function chips(rows){
  const ok = rows.filter(r=>r.status==='ok').length;
  const df = rows.filter(r=>r.status==='diff').length;
  const ms = rows.filter(r=>r.status==='missing_a'||r.status==='missing_b'||r.status==='missing').length;
  let h = `<span class="chip ok">✅ ตรงกัน <span class="n">${ok}</span></span>`;
  if(df) h += `<span class="chip diff">⚠️ ต่างกัน <span class="n">${df}</span></span>`;
  if(ms) h += `<span class="chip miss">❌ ขาด <span class="n">${ms}</span></span>`;
  return `<div class="summary">${h}</div>`;
}

const legend = `<div class="legend">
  <span class="lg"><span class="dot dot-ok"></span> ตรงกัน</span>
  <span class="lg"><span class="dot dot-diff"></span> จำนวนต่างกัน</span>
  <span class="lg"><span class="dot dot-miss"></span> มีฝั่งเดียว</span>
</div>`;

function footer(rec){
  const when = new Date().toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'});
  return `<div class="foot">
    <div class="gen">สร้างเมื่อเปิดหน้า ${esc(when)}${rec.company?' · '+esc(rec.company):''}</div>
    <button class="btn" onclick="window.print()">🖨️ พิมพ์ / บันทึก PDF</button>
  </div>`;
}

// ── helper: สถานะ → คลาสจุดสี / คำอธิบาย ──
function dotClass(status){
  if(status==='ok') return 'dot-ok';
  if(status==='diff') return 'dot-diff';
  return 'dot-miss';
}
function dotTitle(status, leftLbl, rightLbl){
  if(status==='ok') return 'ตรงกัน';
  if(status==='diff') return 'จำนวนต่างกัน';
  if(status==='missing_a') return 'ไม่มีใน ' + leftLbl;
  if(status==='missing_b') return 'ไม่มีใน ' + rightLbl;
  return 'ไม่พบคู่เทียบ';
}
const rowCls = s => s==='diff' ? 'row-diff' : (s==='ok' ? '' : 'row-miss');

// ── แยกรหัสสินค้า [XXXX] ออกจากชื่อ — ชื่อสินค้าจาก Odoo มักเป็น "[รหัส] ชื่อ" ──
// (r.code ที่เก็บไว้คือ Odoo internal id ไม่ใช่รหัสที่คนอ่านรู้เรื่อง จึงดึงจากชื่อแทน)
function splitCode(name){
  const m = String(name||'').match(/^\s*\[([^\]]+)\]\s*(.*)$/);
  if(m && m[2]) return { code: m[1], name: m[2] };
  return { code: '', name: name || '' };
}

// ── เซลล์ฝั่งหนึ่ง: รหัส + ชื่อสินค้า + จำนวน + หน่วย (+ บรรทัดรอง เช่น "วางแผน X") ──
function dataCell(code, name, qtyMain, unit, subText, side){
  const unitHtml = unit ? ` <span class="unit">${esc(unit)}</span>` : '';
  const subHtml = subText ? `<div class="qty-sub">${esc(subText)}${unit?' '+esc(unit):''}</div>` : '';
  return `<div class="cell ${side}">
    <div class="pname">${code?`<span class="code">${esc(code)}</span><br>`:''}${esc(name||'-')}</div>
    <div class="qty">${qtyMain}${unitHtml}</div>
    ${subHtml}
  </div>`;
}
function emptyCell(side){
  return `<div class="cell empty ${side}"><span>— ไม่มีรายการนี้ —</span></div>`;
}
function gridRow(leftHtml, status, rightHtml, leftLbl, rightLbl){
  return `<div class="cmp-row ${rowCls(status)}">
    ${leftHtml}
    <div class="cell mid"><span class="dot ${dotClass(status)}" title="${esc(dotTitle(status,leftLbl,rightLbl))}"></span></div>
    ${rightHtml}
  </div>`;
}
function cmpEmptyMsg(){
  return `<div class="cmp-empty">ไม่มีรายการ</div>`;
}

// ── โหมด 1: เทียบเอกสารกันเอง (SO/PO/PR) — ซ้าย=เอกสาร A, ขวา=เอกสาร B ──
function renderCompare(rec, d){
  const labelA = (d.typeA||'').toUpperCase() + (d.numA||'');
  const labelB = (d.typeB||'').toUpperCase() + (d.numB||'');
  const rows = d.rows || [];

  const body = rows.map(r=>{
    const p = splitCode(r.name);
    const left  = (r.status==='missing_a') ? emptyCell('left')  : dataCell(p.code, p.name, num(r.qtyA), r.unit, null, 'left');
    const right = (r.status==='missing_b') ? emptyCell('right') : dataCell(p.code, p.name, num(r.qtyB), r.unit, null, 'right');
    return gridRow(left, r.status, right, labelA, labelB);
  }).join('');

  app.innerHTML = `<div class="sheet">
    <div class="band">
      <div class="kicker">เปรียบเทียบเอกสาร</div>
      <h1>${esc(labelA)} <span style="opacity:.6">เทียบกับ</span> ${esc(labelB)}</h1>
      ${rec.company?`<div class="co"><b>บริษัท:</b> ${esc(rec.company)}</div>`:''}
    </div>
    <div class="docs">
      ${docCard(labelA, labelA, d.docA)}
      ${docCard(labelB, labelB, d.docB)}
    </div>
    ${chips(rows)}
    ${legend}
    <div class="cmpwrap"><div class="cmp">
      <div class="cmp-head">
        <div class="h">${esc(labelA)}</div>
        <div class="h"></div>
        <div class="h right">${esc(labelB)}</div>
      </div>
      ${rows.length ? body : cmpEmptyMsg()}
    </div></div>
    ${footer(rec)}
  </div>`;
}

// ── โหมด 2: เทียบเอกสารกับใบส่งของ — ซ้าย=PO/SO/PR, ขวา=ใบส่งของ (วางแผน/ส่งจริง) ──
function renderDelivery(rec, d){
  const labelOther = (d.otherType||'').toUpperCase() + (d.otherNum||'');
  const pk = d.picking || {};
  const labelPick = pk.name || 'ใบส่งของ';
  const rows = d.rows || [];

  const body = rows.map(r=>{
    const p = splitCode(r.name);
    const plan = pick(r, ['qtyPlanned','qtyPlan','planned','qty_planned'], 0);
    const done = pick(r, ['qtyDone','qtyActual','qtyDelivered','qty_done'], 0);
    const qtyLeft = pick(r, ['qtyOther','qtyA'], 0);

    const left = (r.status==='missing_a') ? emptyCell('left') : dataCell(p.code, p.name, num(qtyLeft), r.unit, null, 'left');

    let right;
    if(r.status==='missing_b'){
      right = emptyCell('right');
    } else {
      right = dataCell(p.code, p.name, num(done), r.unit, 'วางแผน ' + num(plan), 'right');
    }
    return gridRow(left, r.status, right, labelOther, labelPick);
  }).join('');

  app.innerHTML = `<div class="sheet">
    <div class="band">
      <div class="kicker">เปรียบเทียบกับใบส่งของ</div>
      <h1>${esc(labelOther)} <span style="opacity:.6">เทียบกับ</span> ใบส่งของ ${esc(labelPick)}</h1>
      ${rec.company?`<div class="co"><b>บริษัท:</b> ${esc(rec.company)}</div>`:''}
    </div>
    <div class="docs">
      ${docCard(labelOther, labelOther, d.otherDoc)}
      ${docCard('ใบส่งของ', labelPick, {
        partner: pk.partner, scheduled_date: pk.scheduled_date, state: pk.state
      })}
    </div>
    ${pk.origin?`<div style="padding:10px 18px;font-size:13px;color:var(--muted);border-top:1px solid var(--line)">อ้างอิง: <b style="color:var(--ink)">${esc(pk.origin)}</b></div>`:''}
    ${chips(rows)}
    ${legend}
    <div class="cmpwrap"><div class="cmp">
      <div class="cmp-head">
        <div class="h">${esc(labelOther)}</div>
        <div class="h"></div>
        <div class="h right">ใบส่งของ ${esc(labelPick)}</div>
      </div>
      ${rows.length ? body : cmpEmptyMsg()}
    </div></div>
    ${footer(rec)}
  </div>`;
}

// ── โหลดข้อมูล ──
async function load(){
  const id = qp('id');
  if(!id){ showState('🔎','ไม่พบรหัสเอกสาร','ลิงก์ไม่มีพารามิเตอร์ ?id='); return; }
  try{
    const url = `${SB_URL}/rest/v1/delivery_views?id=eq.${encodeURIComponent(id)}&select=id,title,company,status_label,data`;
    const res = await fetch(url, { headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY } });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const arr = await res.json();
    if(!arr || !arr.length){ showState('📭','ไม่พบข้อมูล','เอกสารนี้อาจหมดอายุ (เก็บ 30 วัน) หรือรหัสไม่ถูกต้อง'); return; }
    const rec = arr[0];
    const d = rec.data || {};
    if(d.mode === 'delivery') renderDelivery(rec, d);
    else renderCompare(rec, d);
    document.title = rec.title || 'เปรียบเทียบเอกสาร';
  }catch(e){
    showState('⚠️','โหลดข้อมูลไม่สำเร็จ', e.message);
  }
}
load();
</script>
</body>
</html>
