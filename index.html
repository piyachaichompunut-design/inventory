<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เปรียบเทียบเอกสาร — Task Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1d29; --ink-soft:#5a6072; --line:#e4e7ef; --paper:#ffffff;
    --bg:#eef1f7; --accent:#e8590c; --accent-soft:#fff1e8;
    --green:#1f9d55; --green-soft:#e6f7ee; --red:#d6336c; --red-soft:#fff0f4;
    --gray:#868e96; --gray-soft:#f1f3f5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'IBM Plex Sans Thai','Sarabun',sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
    padding:24px 16px; -webkit-font-smoothing:antialiased;
  }
  .sheet{
    max-width:780px; margin:0 auto; background:var(--paper);
    border-radius:18px; overflow:hidden;
    box-shadow:0 4px 24px rgba(26,29,41,.08), 0 1px 3px rgba(26,29,41,.06);
  }
  /* header */
  .head{
    background:linear-gradient(135deg,#1a1d29 0%,#2d3142 100%);
    color:#fff; padding:28px 32px; position:relative;
  }
  .head::after{
    content:''; position:absolute; left:0; bottom:0; width:100%; height:4px;
    background:linear-gradient(90deg,var(--accent),#ffa94d);
  }
  .head h1{font-size:24px; font-weight:700; letter-spacing:-.01em; margin-bottom:6px}
  .head .sub{font-size:13px; color:#aeb4c4; font-weight:400}
  .head .proj{font-size:16px; font-weight:600; color:#ffd8a8; margin-top:10px}
  /* summary bar */
  .summary{
    display:flex; flex-wrap:wrap; gap:10px; padding:18px 32px;
    background:var(--gray-soft); border-bottom:1px solid var(--line);
  }
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:999px; font-size:13px; font-weight:600;
    background:#fff; border:1px solid var(--line);
  }
  .chip b{font-weight:700}
  .chip.total{background:var(--ink); color:#fff; border-color:var(--ink)}
  .chip.pending{background:var(--green-soft); color:var(--green); border-color:transparent}
  .chip.done{background:var(--red-soft); color:var(--red); border-color:transparent}
  /* body */
  .body{padding:8px 32px 32px}
  .card{
    border:1px solid var(--line); border-radius:14px; margin-top:20px;
    overflow:hidden;
  }
  .card-head{
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:12px; padding:16px 18px; background:#fafbfc; border-bottom:1px solid var(--line);
  }
  .card-no{
    flex:0 0 auto; width:30px; height:30px; border-radius:9px;
    background:var(--ink); color:#fff; font-weight:700; font-size:14px;
    display:flex; align-items:center; justify-content:center;
  }
  .card-title{flex:1; min-width:0}
  .card-title .name{font-size:16px; font-weight:700; word-break:break-word}
  .badge{
    flex:0 0 auto; padding:5px 12px; border-radius:8px;
    font-size:12.5px; font-weight:700; white-space:nowrap;
  }
  .badge.pending{background:var(--green-soft); color:var(--green)}
  .badge.done{background:var(--red-soft); color:var(--red)}
  .badge.gray{background:var(--gray-soft); color:var(--gray)}
  .meta{padding:14px 18px; display:grid; gap:7px; border-bottom:1px solid var(--line)}
  .meta-row{display:flex; gap:8px; font-size:14px}
  .meta-row .k{color:var(--ink-soft); flex:0 0 auto; min-width:62px}
  .meta-row .v{color:var(--ink); font-weight:500; word-break:break-word}
  /* product table */
  .items{padding:6px 0}
  .items-h{
    padding:10px 18px 6px; font-size:13px; font-weight:700;
    color:var(--ink-soft); text-transform:none;
  }
  .item{
    display:grid; grid-template-columns:1fr auto; gap:4px 14px;
    padding:11px 18px; border-top:1px solid var(--line); align-items:start;
  }
  .item:first-of-type{border-top:none}
  .item .pcode{
    grid-column:1/-1; font-size:12px; color:var(--accent);
    font-weight:600; font-family:'Sarabun',monospace; letter-spacing:.02em;
  }
  .item .pname{font-size:14px; color:var(--ink); word-break:break-word}
  .item .pqty{
    font-size:14px; font-weight:700; color:var(--ink);
    white-space:nowrap; text-align:right; align-self:center;
  }
  /* footer */
  .foot{
    padding:20px 32px; text-align:center; color:var(--ink-soft);
    font-size:12.5px; border-top:1px solid var(--line); background:#fafbfc;
  }
  .foot .print-btn{
    display:inline-flex; align-items:center; gap:7px; margin-bottom:12px;
    padding:10px 22px; border-radius:10px; border:none; cursor:pointer;
    background:var(--accent); color:#fff; font-size:14px; font-weight:600;
    font-family:inherit; transition:transform .12s, box-shadow .12s;
  }
  .foot .print-btn:hover{transform:translateY(-1px); box-shadow:0 4px 12px rgba(232,89,12,.3)}
  /* states */
  .loading,.error{
    max-width:780px; margin:60px auto; text-align:center;
    color:var(--ink-soft); font-size:15px;
  }
  .error{color:var(--red)}
  .spinner{
    width:32px; height:32px; margin:0 auto 16px; border-radius:50%;
    border:3px solid var(--line); border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  /* print */
  @media print{
    body{background:#fff; padding:0}
    .sheet{box-shadow:none; border-radius:0; max-width:100%}
    .foot .print-btn{display:none}
    .card{break-inside:avoid}
  }
  @media(max-width:520px){
    body{padding:12px 8px}
    .head,.summary,.body,.foot{padding-left:18px; padding-right:18px}
  }
  /* doc info cards */
  .docs{display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:18px 32px 4px}
  .doc-card{border:1px solid var(--line); border-radius:12px; padding:14px 16px}
  .doc-card .dlabel{
    display:inline-block; font-size:12px; font-weight:700; padding:3px 10px;
    border-radius:6px; background:var(--ink); color:#fff; margin-bottom:8px;
  }
  .doc-card .dname{font-size:15px; font-weight:700; margin-bottom:6px; word-break:break-word}
  .doc-card .drow{font-size:12.5px; color:var(--ink-soft); display:flex; gap:6px; margin-top:3px}
  .doc-card .drow b{color:var(--ink); font-weight:600}
  /* compare table */
  .ctable-wrap{padding:18px 32px 32px; overflow-x:auto}
  table.ctable{width:100%; border-collapse:collapse; font-size:13px; min-width:480px}
  table.ctable th{
    background:var(--ink); color:#fff; text-align:left; padding:10px 12px;
    font-weight:600; font-size:12.5px; white-space:nowrap;
  }
  table.ctable th.num, table.ctable td.num{text-align:right}
  table.ctable td{padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:top}
  table.ctable tr:last-child td{border-bottom:none}
  table.ctable .pcode{font-size:11px; color:var(--accent); font-weight:600; display:block; margin-bottom:2px}
  table.ctable tr.diff td{background:#fff9e8}
  table.ctable tr.missing td{background:var(--red-soft)}
  table.ctable .stt{font-weight:700; font-size:12px; white-space:nowrap}
  table.ctable tr.ok .stt{color:var(--green)}
  table.ctable tr.diff .stt{color:#e8a317}
  table.ctable tr.missing .stt{color:var(--red)}
  @media print{ .ctable-wrap{overflow-x:visible} }
  @media(max-width:680px){ .docs{grid-template-columns:1fr} }
</style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      กำลังโหลดข้อมูลเปรียบเทียบ...
    </div>
  </div>

<script>
const SUPABASE_URL = 'https://rvdboyrusmrjzurukwja.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2ZGJveXJ1c21yanp1cnVrd2phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNTQ3MDEsImV4cCI6MjA5NTgzMDcwMX0.UxP6ZlJ41DxxG_ofA6ge43XIfm6BMIOARvmsn1gDtrQ';

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function fmtNum(n){ return (n||0).toLocaleString('th-TH', {maximumFractionDigits:2}); }


function docCard(doc, label, type){
  if(!doc) return '<div class="doc-card"><div class="dlabel">'+esc(label)+'</div><div class="dname">ไม่พบเอกสาร</div></div>';
  const partner = Array.isArray(doc.partner_id) ? doc.partner_id[1]
                : Array.isArray(doc.requested_by) ? doc.requested_by[1] : '';
  const date = doc.date_order || doc.date_start || '';
  let html = '<div class="doc-card">'+
    '<div class="dlabel">'+esc(label)+'</div>'+
    '<div class="dname">'+esc(doc.name||'-')+'</div>';
  if(partner) html += '<div class="drow"><b>'+(type==='po'?'ผู้ขาย':type==='pr'?'ผู้ขอ':'ลูกค้า')+':</b> '+esc(partner)+'</div>';
  if(date) html += '<div class="drow"><b>วันที่:</b> '+esc(String(date).slice(0,10))+'</div>';
  if(doc.amount_total) html += '<div class="drow"><b>ยอดรวม:</b> '+fmtNum(doc.amount_total)+' บาท</div>';
  html += '</div>';
  return html;
}

function render(d){
  const data = d.data || {};
  const rows = data.rows || [];
  const labelA = (data.typeA||'').toUpperCase() + (data.numA||'');
  const labelB = (data.typeB||'').toUpperCase() + (data.numB||'');

  const cntOk   = rows.filter(r=>r.status==='ok').length;
  const cntDiff = rows.filter(r=>r.status==='diff').length;
  const cntMis  = rows.filter(r=>r.status==='missing_a' || r.status==='missing_b').length;

  let chips = '<span class="chip total">รวม <b>'+rows.length+'</b> รายการ</span>';
  chips += '<span class="chip pending">ตรงกัน <b>'+cntOk+'</b></span>';
  if(cntDiff) chips += '<span class="chip" style="background:#fff9e8;color:#e8a317">ต่างกัน <b>'+cntDiff+'</b></span>';
  if(cntMis)  chips += '<span class="chip done">ขาด <b>'+cntMis+'</b></span>';

  const statusLabel = (st) => {
    if(st==='ok') return '✅ ตรงกัน';
    if(st==='diff') return '⚠️ ต่างกัน';
    if(st==='missing_a') return '❌ ไม่มีใน '+esc(labelA);
    if(st==='missing_b') return '❌ ไม่มีใน '+esc(labelB);
    return st;
  };

  const trClass = (st) => st==='ok' ? 'ok' : (st==='diff' ? 'diff' : 'missing');

  let tableRows = rows.map(r=>{
    return '<tr class="'+trClass(r.status)+'">'+
      '<td>'+(r.code?'<span class="pcode">'+esc(r.code)+'</span>':'')+esc(r.name||'-')+'</td>'+
      '<td class="num">'+fmtNum(r.qtyA)+'</td>'+
      '<td class="num">'+fmtNum(r.qtyB)+'</td>'+
      '<td class="num">'+(r.diff>0?'+':'')+fmtNum(r.diff)+'</td>'+
      '<td class="stt">'+statusLabel(r.status)+'</td>'+
    '</tr>';
  }).join('');

  document.getElementById('app').innerHTML =
    '<div class="sheet">'+
      '<div class="head">'+
        '<h1>'+esc(d.title||'เปรียบเทียบเอกสาร')+'</h1>'+
        '<div class="sub">Task Management System — ดึงข้อมูลจาก Odoo</div>'+
        (d.status_label?'<div class="proj">บริษัท: '+esc(d.status_label)+'</div>':'')+
      '</div>'+
      '<div class="summary">'+chips+'</div>'+
      '<div class="docs">'+
        docCard(data.docA, labelA, data.typeA)+
        docCard(data.docB, labelB, data.typeB)+
      '</div>'+
      '<div class="ctable-wrap"><table class="ctable">'+
        '<thead><tr>'+
          '<th>สินค้า</th>'+
          '<th class="num">'+esc(labelA)+'</th>'+
          '<th class="num">'+esc(labelB)+'</th>'+
          '<th class="num">ผลต่าง</th>'+
          '<th>สถานะ</th>'+
        '</tr></thead>'+
        '<tbody>'+(tableRows||'<tr><td colspan="5" style="text-align:center;color:var(--ink-soft)">ไม่มีรายการ</td></tr>')+'</tbody>'+
      '</table></div>'+
      '<div class="foot">'+
        '<button class="print-btn" onclick="window.print()">🖨️ พิมพ์ / บันทึก PDF</button>'+
        '<div>พิมพ์เมื่อ '+new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})+'</div>'+
      '</div>'+
    '</div>';
  document.title = (d.title||'เปรียบเทียบเอกสาร')+' — TMS';
}

async function load(){
  const id = new URLSearchParams(location.search).get('id');
  if(!id){ document.getElementById('app').innerHTML='<div class="error">ไม่พบรหัสข้อมูลเปรียบเทียบ</div>'; return; }
  try{
    const r = await fetch(SUPABASE_URL+'/rest/v1/delivery_views?id=eq.'+encodeURIComponent(id)+'&select=*',{
      headers:{ apikey:SUPABASE_ANON, Authorization:'Bearer '+SUPABASE_ANON }
    });
    const rows = await r.json();
    if(!rows || !rows.length){ document.getElementById('app').innerHTML='<div class="error">ไม่พบข้อมูลนี้ (อาจหมดอายุแล้ว)</div>'; return; }
    render(rows[0]);
  }catch(e){
    document.getElementById('app').innerHTML='<div class="error">โหลดไม่สำเร็จ: '+esc(e.message)+'</div>';
  }
}
load();
</script>
</body>
</html>
